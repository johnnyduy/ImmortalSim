<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Thức Hải Tiểu Nhân – Ngộ Đạo Tâm Pháp</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;400;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;700&amp;family=Space+Grotesk:wght@600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }
        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.4)); }
            50% { filter: drop-shadow(0 0 35px rgba(0, 240, 255, 0.8)); }
        }
        @keyframes particle-drift {
            from { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            to { transform: translateY(-100vh) translateX(30px); opacity: 0; }
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        @keyframes combo-pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px #ffdb3c); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 20px #ffdb3c); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px #ffdb3c); }
        }
        @keyframes ripple-out {
            from { transform: scale(0); opacity: 0.8; }
            to { transform: scale(4); opacity: 0; }
        }

        .floating-cultivator { animation: float 4s ease-in-out infinite; }
        .spirit-aura { animation: pulse-glow 3s ease-in-out infinite; }
        .spirit-particle { position: absolute; pointer-events: none; animation: particle-drift var(--d) linear infinite; }
        .combo-aura { animation: combo-pulse 0.8s ease-in-out infinite; }
        .shimmer-effect {
            position: relative;
            overflow: hidden;
        }
        .shimmer-effect::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }
        
        .glass-panel {
            background: rgba(15, 16, 47, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 240, 255, 0.1);
        }

        body {
            overflow: hidden;
            background: #0f102f;
            height: 100vh;
            width: 100vw;
            touch-action: none;
        }

        .sea-of-consciousness {
            background: radial-gradient(circle at center, #1b1c3c 0%, #090a2a 100%);
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(0, 240, 255, 0.3);
            border: 1px solid rgba(0, 240, 255, 0.5);
            pointer-events: none;
            animation: ripple-out 0.6s ease-out forwards;
        }
    </style>

<script>
        // Background Particles
        const particleContainer = document.getElementById('particle-container');
        function createParticles() {
            for(let i=0; i<40; i++) {
                const p = document.createElement('div');
                p.className = 'spirit-particle w-1 h-1 bg-primary-container rounded-full shadow-[0_0_5px_#00f0ff]';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = (Math.random() * 100 + 100) + 'vh';
                p.style.setProperty('--d', (Math.random() * 10 + 5) + 's');
                p.style.opacity = Math.random();
                particleContainer.appendChild(p);
            }
        }
        createParticles();

        // Gameplay Interaction: Ripple Effect
        document.body.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            createRipple(touch.clientX, touch.clientY);
        });

        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            const size = 30;
            ripple.style.width = size + 'px';
            ripple.style.height = size + 'px';
            ripple.style.left = (x - size/2) + 'px';
            ripple.style.top = (y - size/2) + 'px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        // Gameplay Entities (Linh Tự & Tâm Ma)
        const entitiesContainer = document.getElementById('gameplay-entities');
        const spiritualWords = ['悟', '道', '法', '玄', '灵'];

        function spawnEntity() {
            const isSpiritual = Math.random() > 0.4;
            const entity = document.createElement('div');
            
            // Random spawn side
            const side = Math.floor(Math.random() * 4);
            let startX, startY;
            if(side === 0) { startX = Math.random() * 100; startY = -10; } // Top
            else if(side === 1) { startX = 110; startY = Math.random() * 100; } // Right
            else if(side === 2) { startX = Math.random() * 100; startY = 110; } // Bottom
            else { startX = -10; startY = Math.random() * 100; } // Left

            entity.className = 'absolute transition-all duration-[4000ms] ease-in-out pointer-events-auto flex items-center justify-center';
            entity.style.left = startX + '%';
            entity.style.top = startY + '%';
            
            if(isSpiritual) {
                entity.innerHTML = `
                    <div class="relative group cursor-pointer">
                        <div class="absolute inset-0 bg-secondary-container/20 blur-md rounded-full group-hover:scale-150 transition-transform"></div>
                        <div class="w-12 h-12 glass-panel border-secondary-container/40 rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(255,219,60,0.4)]">
                            <span class="text-secondary-container font-headline-md font-bold">${spiritualWords[Math.floor(Math.random() * spiritualWords.length)]}</span>
                        </div>
                    </div>
                `;
            } else {
                entity.innerHTML = `
                    <div class="relative group cursor-pointer">
                        <div class="absolute inset-0 bg-error/20 blur-xl rounded-full animate-pulse"></div>
                        <div class="w-14 h-14 rounded-full flex items-center justify-center border-error/30 bg-error-container/10 border-2">
                            <span class="material-symbols-outlined text-error text-3xl">noise_control_off</span>
                        </div>
                    </div>
                `;
            }

            entitiesContainer.appendChild(entity);

            // Move towards center with slight offset
            requestAnimationFrame(() => {
                setTimeout(() => {
                    entity.style.left = (45 + Math.random() * 10) + '%';
                    entity.style.top = (45 + Math.random() * 10) + '%';
                    entity.style.transform = 'scale(0.5)';
                    entity.style.opacity = '0';
                }, 100);
            });

            entity.addEventListener('touchstart', (e) => {
                e.stopPropagation();
                entity.style.display = 'none';
                createRipple(e.touches[0].clientX, e.touches[0].clientY);
                // In a real game, logic for points/damage would go here
            });

            setTimeout(() => entity.remove(), 4100);
        }

        // Spawn loop
        setInterval(spawnEntity, 1200);

    </script>
